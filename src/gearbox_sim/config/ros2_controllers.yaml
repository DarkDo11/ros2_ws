controller_manager:
  ros__parameters:
    update_rate: 250
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    ur5e_1_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    ur5e_2_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    ur3e_controller:
      type: joint_trajectory_controller/JointTrajectoryController

ur5e_1_controller:
  ros__parameters:
    joints:
      - ur5e_press_shoulder_pan_joint
      - ur5e_press_shoulder_lift_joint
      - ur5e_press_elbow_joint
      - ur5e_press_wrist_1_joint
      - ur5e_press_wrist_2_joint
      - ur5e_press_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.01

ur5e_2_controller:
  ros__parameters:
    joints:
      - ur5e_assembly_shoulder_pan_joint
      - ur5e_assembly_shoulder_lift_joint
      - ur5e_assembly_elbow_joint
      - ur5e_assembly_wrist_1_joint
      - ur5e_assembly_wrist_2_joint
      - ur5e_assembly_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.01

ur3e_controller:
  ros__parameters:
    joints:
      - ur3e_screw_shoulder_pan_joint
      - ur3e_screw_shoulder_lift_joint
      - ur3e_screw_elbow_joint
      - ur3e_screw_wrist_1_joint
      - ur3e_screw_wrist_2_joint
      - ur3e_screw_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.01
