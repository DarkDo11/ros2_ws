  ros_type_name: "trajectory_msgs/msg/JointTrajectory"
  gz_type_name: "gz.msgs.JointTrajectory"
  direction: ROS_TO_GZ

- ros_topic_name: "/ur5e_assembly/joint_trajectory"
  gz_topic_name: "/ur5e_assembly/joint_trajectory"
